<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Team Tracker</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 20px; color: #3c4043; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .rewards-banner { display: flex; justify-content: space-around; background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .reward-item { text-align: center; opacity: 0.25; font-size: 0.85em; transition: 0.3s; }
        .reward-item.active { opacity: 1; transform: scale(1.1); font-weight: bold; color: var(--success); }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        select { padding: 6px; border-radius: 4px; border: 1px solid #ddd; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .btn-reset { margin-top: 10px; background: none; border: none; color: #70757a; cursor: pointer; text-decoration: underline; font-size: 12px; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">⚡ Bolt Clock-In Game</h1>

    <div class="rewards-banner" id="rewardBanner">
        <div class="reward-item" id="reward-5">🥐<br>5D: B-fast</div>
        <div class="reward-item" id="reward-10">🍱<br>10D: Lunch</div>
        <div class="reward-item" id="reward-15">🏠<br>15D: Remote</div>
        <div class="reward-item" id="reward-30">✈️<br>30D: Day Off</div>
    </div>

    <div style="text-align: center; margin-bottom: 10px;">
        <strong>Team Streak: <span id="teamStreak">0</span> Days</strong>
    </div>

    <table>
        <thead>
            <tr>
                <th>Member</th>
                <th>Status</th>
                <th>Streak</th>
                <th>Tickets</th>
            </tr>
        </thead>
        <tbody id="teamBody"></tbody>
    </table>

    <button class="btn-save" onclick="processDay()">Confirm Today's Attendance</button>
    <button class="btn-reset" onclick="resetAll()">Reset All Data (Careful!)</button>
</div>

<script>
    const team = ["Annika", "Eleanor", "Geehye", "Gui", "Jenna", "Matt", "Oriol", "Tommy", "Zhixiao"];
    const options = ["On Time", "Late", "Remote", "OOO", "Office Closed", "PASS", "Sick"];
    
    // 从 LocalStorage 加载数据，如果没有则初始化
    let state = JSON.parse(localStorage.getItem('boltTrackerData')) || {
        teamStreak: 0,
        members: team.reduce((acc, name) => {
            acc[name] = { personalStreak: 0, tickets: 0 };
            return acc;
        }, {})
    };

    function init() {
        const tbody = document.getElementById('teamBody');
        tbody.innerHTML = '';
        team.forEach(name => {
            const m = state.members[name];
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${name}</strong></td>
                <td>
                    <select id="status-${name}">
                        ${options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                    </select>
                </td>
                <td>${m.personalStreak}d</td>
                <td>${m.tickets} 🎫</td>
            `;
            tbody.appendChild(row);
        });
        updateUI();
    }

    function processDay() {
        let allOnTime = true;
        team.forEach(name => {
            const status = document.getElementById(`status-${name}`).value;
            const m = state.members[name];

            if (status === "On Time") {
                m.personalStreak++;
                if (m.personalStreak % 10 === 0) m.tickets++;
            } else if (status === "Late") {
                if (m.tickets > 0 && confirm(`${name} is late! Use a Golden Ticket?`)) {
                    m.tickets--;
                } else {
                    m.personalStreak = 0;
                    allOnTime = false;
                }
            } else if (status !== "Remote" && status !== "Office Closed") {
                m.personalStreak = 0; // 其他状态不记连胜
            }
        });

        state.teamStreak = allOnTime ? state.teamStreak + 1 : 0;
        localStorage.setItem('boltTrackerData', JSON.stringify(state));
        init();
    }

    function updateUI() {
        document.getElementById('teamStreak').innerText = state.teamStreak;
        [5, 10, 15, 30].forEach(d => {
            document.getElementById(`reward-${d}`).classList.toggle('active', state.teamStreak >= d);
        });
    }

    function resetAll() {
        if(confirm("Are you sure? This clears all streaks and tickets!")) {
            localStorage.clear();
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
