<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Team Hub - Logic Pro</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --bg: #f8f9fa; --danger: #d93025; --yellow: #fbc02d; --gold: #af9500; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        .container { max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        
        .streak-hero { text-align: center; background: linear-gradient(135deg, #e8f0fe 0%, #ffffff 100%); border: 1px solid #d2e3fc; }
        .streak-number { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 10px 0; }

        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .weekday-label { text-align: center; font-size: 11px; font-weight: bold; color: #9aa0a6; }
        .cal-day { aspect-ratio: 1.1; background: white; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #e0e0e0; cursor: pointer; transition: 0.2s; position: relative; }
        .cal-day.active { border: 3px solid var(--primary); transform: scale(1.02); }
        .day-success { background: #e6f4ea; color: #1e8e3e; border-color: #34a853; }
        .day-fail { background: #fce8e6; color: #d93025; border-color: #ea4335; }
        .cal-day span { font-size: 8px; font-weight: bold; margin-top: 4px; }

        .redeem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .redeem-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: #f8f9fa; border-radius: 10px; border: 1px solid #eee; }
        .redeem-item.ready { border-color: var(--yellow); background: #fffef0; }
        .redeem-item.locked { opacity: 0.4; filter: grayscale(1); }

        .wallet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .wallet-item { background: #fffdf0; border: 1px solid #fbc02d; padding: 10px; border-radius: 8px; text-align: center; }

        #editBlock { display: none; background: #fffbe6; border: 2px solid #ffe58f; }
        .edit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0; color:var(--primary)">⚡ Bolt Team Hub</h2>
        <div id="syncStat" style="font-size:11px; color:#888;">📡 Connecting...</div>
    </div>

    <div class="card streak-hero">
        <span style="font-size: 12px; font-weight: bold; color: #70757a;">CURRENT STREAK</span>
        <div class="streak-number" id="streakDisplay">0</div>
        <div class="redeem-grid" id="redeemList"></div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 15px 0">🎫 Member Wallet</h3>
        <div class="wallet-grid" id="walletGrid"></div>
    </div>

    <div class="card">
        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <h3 id="monthDisplay" style="margin:0">Month Year</h3>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card" id="editBlock">
        <h3 style="margin:0; color: #856404;" id="editTitle">Edit Attendance</h3>
        <div class="edit-grid" id="editGrid"></div>
        <button class="btn-main" id="saveBtn" onclick="saveAttendance()">Update GitHub CSV</button>
    </div>
</div>

<script>
    const GITHUB_USER = "Jeeshau";
    const GITHUB_REPO = "Bolt-Clock-In";
    const FILE_PATH = "data.csv";
    const team = ["Annika", "Eleanor", "Geehye", "Gui", "Jenna", "Matt", "Oriol", "Tommy", "Zhixiao"];
    const statusOpts = ["On Time", "Late", "Golden Ticket", "Remote", "OOO", "Sick", "PASS"];
    const milestones = [{d: 5, t: "Breakfast 🥐"}, {d: 10, t: "Lunch 🍱"}, {d: 15, t: "Remote 🏠"}, {d: 30, t: "Day Off ✈️"}];

    let GITHUB_TOKEN = localStorage.getItem('bolt_gh_token') || prompt("Enter Token:");
    localStorage.setItem('bolt_gh_token', GITHUB_TOKEN);

    let csvData = [];
    let viewDate = new Date();
    let activeDate = "";
    let currentWallet = {}; // 存储当前成员余额

    async function load() {
        try {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}?t=${Date.now()}`;
            const resp = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const json = await resp.json();
            const content = decodeURIComponent(escape(atob(json.content)));
            csvData = content.split('\n').filter(l => l.trim() !== "").map(l => l.split(','));
            document.getElementById('syncStat').innerText = "✅ Synced";
            refresh();
        } catch(e) { document.getElementById('syncStat').innerText = "❌ Sync Error"; }
    }

    function refresh() {
        // 计算钱包和赎回
        const wallet = team.reduce((acc, n) => { acc[n] = 0; return acc; }, {});
        const redeemed = {};
        const attendance = [];

        csvData.forEach(row => {
            if (row[0] === "REDEEM") redeemed[row[1]] = true;
            else if (row[0] === "TRANSFER") { wallet[row[1]]--; wallet[row[2]]++; }
            else if (row[0] !== "Date") {
                attendance.push(row);
                team.forEach((n, i) => { if (row[i+1] === "Golden Ticket") wallet[n]--; });
            }
        });
        currentWallet = wallet; // 更新全局钱包状态

        // 渲染 UI
        const sorted = attendance.sort((a, b) => new Date(a[0]) - new Date(b[0]));
        let streak = 0;
        sorted.forEach(row => { if (new Date(row[0]).getDay() % 6 !== 0) streak = row.slice(1).includes("Late") ? 0 : streak + 1; });
        document.getElementById('streakDisplay').innerText = streak;
        
        document.getElementById('redeemList').innerHTML = milestones.map(m => `
            <div class="redeem-item ${streak >= m.d ? 'ready' : 'locked'}">
                <input type="checkbox" ${redeemed['s'+m.d] ? 'checked' : ''} ${streak >= m.d ? '' : 'disabled'} onchange="syncRedeem('s${m.d}')">
                <span style="font-size:12px"><b>${m.d}D:</b> ${m.t}</span>
            </div>
        `).join('');

        document.getElementById('walletGrid').innerHTML = team.map(n => `<div class="wallet-item"><small>${n}</small><br><b>${wallet[n] < 0 ? 0 : wallet[n]}</b></div>`).join('');
        renderCalendar();
    }

    async function saveAttendance() {
        // 1. 验证 Golden Ticket 余额
        for (let n of team) {
            const status = document.getElementById(`edit-${n}`).value;
            if (status === "Golden Ticket" && currentWallet[n] <= 0) {
                alert(`❌ Error: ${n} does not have any Golden Tickets! Use 'Late' or transfer a ticket first.`);
                return; // 终止保存
            }
        }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "⏳ Saving...";
        try {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
            const get = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const json = await get.json();
            const lines = decodeURIComponent(escape(atob(json.content))).split('\n');
            const newRow = [activeDate, ...team.map(n => document.getElementById(`edit-${n}`).value)].join(",");
            const idx = lines.findIndex(l => l.startsWith(activeDate));
            if(idx !== -1) lines[idx] = newRow; else lines.push(newRow);
            
            await fetch(url, {
                method: "PUT",
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Log ${activeDate}`, content: btoa(unescape(encodeURIComponent(lines.join('\n')))), sha: json.sha })
            });
            alert("Success!"); load(); document.getElementById('editBlock').style.display = "none";
        } catch(e) { alert("Fail"); }
        btn.disabled = false; btn.innerText = "Update GitHub CSV";
    }

    async function syncRedeem(id) {
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        const get = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
        const json = await get.json();
        let lines = decodeURIComponent(escape(atob(json.content))).split('\n');
        const idx = lines.findIndex(l => l.startsWith(`REDEEM,${id}`));
        if (idx !== -1) lines.splice(idx, 1); else lines.push(`REDEEM,${id},${new Date().toISOString().split('T')[0]}`);
        await fetch(url, { method: "PUT", headers: { 'Authorization': `token ${GITHUB_TOKEN}` }, body: JSON.stringify({ message: "Redeem", content: btoa(unescape(encodeURIComponent(lines.join('\n')))), sha: json.sha }) });
        load();
    }

    function renderCalendar() {
        document.getElementById('monthDisplay').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cal = document.getElementById('calendarGrid'); cal.innerHTML = '';
        ["Mon", "Tue", "Wed", "Thu", "Fri"].forEach(d => cal.innerHTML += `<div class="weekday-label">${d}</div>`);
        const y = viewDate.getFullYear(), m = viewDate.getMonth(), days = new Date(y, m+1, 0).getDate();
        for(let d=1; d<=days; d++) {
            const dObj = new Date(y, m, d);
            if (dObj.getDay() % 6 === 0) continue;
            if (d === 1 && dObj.getDay() !== 1) for(let i=0; i<dObj.getDay()-1; i++) cal.innerHTML += `<div class="cal-day empty"></div>`;
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const row = csvData.find(r => r[0] === ds);
            let cls = '', lbl = '';
            if(row) {
                const late = row.slice(1).includes("Late"), tkt = row.slice(1).includes("Golden Ticket");
                cls = late ? 'day-fail' : 'day-success';
                lbl = late ? '<span>LATE</span>' : (tkt ? '<span style="color:var(--gold)">TICKET</span>' : '<span>OK</span>');
            }
            cal.innerHTML += `<div class="cal-day ${cls} ${activeDate === ds ? 'active' : ''}" onclick="openEdit('${ds}')"><strong>${d}</strong>${lbl}</div>`;
        }
    }

    function openEdit(ds) {
        activeDate = ds; renderCalendar();
        const row = csvData.find(r => r[0] === ds);
        document.getElementById('editBlock').style.display = "block";
        document.getElementById('editGrid').innerHTML = team.map((n, i) => `
            <div style="display:flex; flex-direction:column"><label style="font-size:10px;font-weight:bold">${n}</label>
            <select id="edit-${n}">${statusOpts.map(o => `<option value="${o}" ${(row && row[i+1] === o) ? 'selected' : ''}>${o}</option>`).join('')}</select></div>
        `).join('');
    }

    function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
    load();
</script>
</body>
</html>
