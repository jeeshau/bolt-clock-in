<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bolt Team Live Sync</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .sync-status { font-size: 12px; color: #666; margin-bottom: 10px; text-align: right; }
        .date-box { background: #fffde7; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px dashed #fbc02d; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="container" id="mainApp">
    <h2 style="text-align: center;">🔄 Bolt Live Sync Tracker</h2>
    <div class="sync-status" id="status">Checking GitHub Sync...</div>

    <div class="date-box">
        <label><b>Target Date: </b></label>
        <input type="date" id="logDate">
    </div>

    <table>
        <thead><tr><th>Member</th><th>Status</th></tr></thead>
        <tbody id="teamBody"></tbody>
    </table>

    <button class="btn-save" id="saveBtn" onclick="uploadToGitHub()">Push Updates to GitHub (CSV)</button>
    <p style="font-size: 11px; color: #999; text-align: center; margin-top: 15px;">
        All changes will be reflected in <b>data.csv</b> in your repository.
    </p>
</div>

<script>
    // --- 配置区 ---
    const GITHUB_USER = "Jeeshau";
    const GITHUB_REPO = "Bolt-Clock-In";
    const FILE_PATH = "data.csv";
    const GITHUB_TOKEN = "在此粘贴你的_TOKEN"; // 重要：不要泄露此 Token 给他人
    
    const team = ["Annika", "Eleanor", "Geehye", "Gui", "Jenna", "Matt", "Oriol", "Tommy", "Zhixiao"];
    const options = ["On Time", "Late", "Remote", "OOO", "Sick", "PASS"];
    let currentSha = ""; // GitHub API 需要这个来更新文件

    document.getElementById('logDate').valueAsDate = new Date();

    // 1. 从 GitHub 读取数据
    async function loadFromGitHub() {
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            const resp = await fetch(url, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
            const json = await resp.json();
            currentSha = json.sha;
            
            // 解码 Base64 内容
            const content = decodeURIComponent(escape(atob(json.content)));
            console.log("CSV Loaded:", content);
            document.getElementById('status').innerText = "✅ Synced with GitHub data.csv";
            
            initTable();
        } catch (err) {
            document.getElementById('status').innerText = "❌ Sync Failed: Check Token/Path";
        }
    }

    function initTable() {
        const body = document.getElementById('teamBody');
        body.innerHTML = team.map(n => `
            <tr>
                <td><strong>${n}</strong></td>
                <td><select id="sel-${n}">${options.map(o => `<option value="${o}">${o}</option>`).join('')}</select></td>
            </tr>
        `).join('');
    }

    // 2. 将新记录合并并推送到 GitHub
    async function uploadToGitHub() {
        const btn = document.getElementById('saveBtn');
        const dateVal = document.getElementById('logDate').value;
        btn.innerText = "Uploading to GitHub...";
        btn.classList.add('loading');

        // 先获取最新的文件内容（防止多人同时操作冲突）
        const getUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        const getResp = await fetch(getUrl, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
        const getJson = await getResp.json();
        const oldContent = decodeURIComponent(escape(atob(getJson.content)));
        const sha = getJson.sha;

        // 构建新的一行数据
        const rowData = [dateVal];
        team.forEach(n => rowData.push(document.getElementById(`sel-${n}`).value));
        const newRowStr = rowData.join(",");

        // 简单的 CSV 合并逻辑：如果日期已存在则替换，否则新增
        let lines = oldContent.split("\n").filter(l => l.trim() !== "");
        const existingIdx = lines.findIndex(l => l.startsWith(dateVal));
        if (existingIdx !== -1) {
            lines[existingIdx] = newRowStr;
        } else {
            lines.push(newRowStr);
        }
        const finalContent = lines.join("\n");

        // 发送 PUT 请求更新 GitHub
        const putResp = await fetch(getUrl, {
            method: "PUT",
            headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: `Update attendance for ${dateVal}`,
                content: btoa(unescape(encodeURIComponent(finalContent))),
                sha: sha
            })
        });

        if (putResp.ok) {
            alert("Success! GitHub CSV has been updated.");
            loadFromGitHub();
        } else {
            alert("Upload failed. Check console for details.");
        }
        btn.innerText = "Push Updates to GitHub (CSV)";
        btn.classList.remove('loading');
    }

    loadFromGitHub();
</script>
</body>
</html>
