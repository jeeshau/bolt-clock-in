<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Team Hub</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --bg: #f8f9fa; --danger: #d93025; --yellow: #fbc02d; --gold: #af9500; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px; }
        .btn-token { background: none; border: 1px solid #dadce0; padding: 4px 10px; border-radius: 6px; cursor: pointer; color: #70757a; font-size: 11px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 25px; background: #f1f3f4; padding: 5px; border-radius: 10px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; border: none; background: none; font-weight: bold; color: #5f6368; border-radius: 8px; transition: 0.2s; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .section { display: none; }
        .section.active { display: block; }

        /* --- 日历通用样式 --- */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-nav button { background: #e8f0fe; border: none; color: var(--primary); padding: 5px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .weekday-label { text-align: center; font-size: 11px; font-weight: bold; color: #70757a; padding-bottom: 5px; }
        .cal-day { aspect-ratio: 1.2; background: white; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #e0e0e0; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .cal-day:hover { border-color: var(--primary); transform: translateY(-2px); }
        .cal-day.empty { background: transparent; border: none; cursor: default; }
        .cal-day span { font-size: 8px; margin-top: 2px; font-weight: bold; }

        .day-success { background: #e6f4ea; color: #1e8e3e; border-color: #34a853; }
        .day-fail { background: #fce8e6; color: #d93025; border-color: #ea4335; }
        .day-active { outline: 3px solid var(--primary); z-index: 1; }

        /* 详情展示区 */
        .history-detail { margin-top: 20px; padding: 15px; background: #f1f3f4; border-radius: 12px; display: none; }
        .detail-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
        .status-tag { font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        /* 录入区 */
        .date-input-wrap { text-align: center; margin-bottom: 20px; }
        .date-input-wrap input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; font-family: inherit; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #70757a; font-size: 13px; border-bottom: 2px solid #f1f3f4; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f3f4; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #dadce0; }
        .btn-save { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; }
        
        /* Golden Ticket 专属颜色 */
        option[value="Golden Ticket"] { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-meta">
        <span id="syncStat">📡 Syncing...</span>
        <button class="btn-token" onclick="updateToken()">Update Token</button>
    </div>

    <div class="tabs">
        <button class="tab active" id="btn-checkin" onclick="switchTab('checkin')">Daily Log</button>
        <button class="tab" id="btn-history" onclick="switchTab('history')">History Archive</button>
    </div>

    <div id="checkin" class="section active">
        <div class="date-input-wrap">
            <label style="display:block; margin-bottom:8px; font-size:12px; color:#70757a">Select Date to Edit:</label>
            <input type="date" id="logDate" onchange="loadData()">
        </div>
        <table>
            <thead><tr><th>Member</th><th>Status</th></tr></thead>
            <tbody id="teamBody"></tbody>
        </table>
        <button class="btn-save" id="saveBtn" onclick="uploadToGitHub()">Push Updates to GitHub</button>
    </div>

    <div id="history" class="section">
        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">◀ Prev</button>
            <h4 id="monthDisplay">Month Year</h4>
            <button onclick="changeMonth(1)">Next ▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>

        <div id="historyDetail" class="history-detail">
            <h4 id="detailTitle" style="margin-top:0">Selection Details</h4>
            <div id="detailContent"></div>
            <button onclick="editThisDay()" style="margin-top:15px; width:100%; padding:8px; border-radius:6px; border:1px solid var(--primary); color:var(--primary); background:none; cursor:pointer">Edit This Day</button>
        </div>

        <div style="background: #fff9c4; border: 1px dashed var(--yellow); padding: 20px; border-radius: 12px; margin-top: 25px;">
            <p style="margin:0">Team Streak: <strong id="streakDisplay" style="color:var(--success)">0</strong> Days</p>
        </div>
    </div>
</div>

<script>
    const GITHUB_USER = "Jeeshau";
    const GITHUB_REPO = "Bolt-Clock-In";
    const FILE_PATH = "data.csv";
    const team = ["Annika", "Eleanor", "Geehye", "Gui", "Jenna", "Matt", "Oriol", "Tommy", "Zhixiao"];
    // 增加了 Golden Ticket 选项
    const options = ["On Time", "Late", "Golden Ticket", "Remote", "OOO", "Sick", "PASS"];
    
    let GITHUB_TOKEN = localStorage.getItem('bolt_gh_token');
    let csvData = [];
    let viewDate = new Date();
    let selectedDateForDetail = "";

    document.getElementById('logDate').valueAsDate = new Date();

    function switchTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'history') renderHistory();
    }

    function updateToken() {
        const t = prompt("Enter GitHub Token:");
        if(t) { localStorage.setItem('bolt_gh_token', t); location.reload(); }
    }

    async function loadData() {
        if(!GITHUB_TOKEN) return;
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            const resp = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const json = await resp.json();
            const content = decodeURIComponent(escape(atob(json.content)));
            csvData = content.split('\n').filter(l => l.trim() !== "").map(l => l.split(','));
            document.getElementById('syncStat').innerHTML = "✅ Synced";
            
            // 填充表单
            const dateVal = document.getElementById('logDate').value;
            const record = csvData.find(row => row[0] === dateVal);
            team.forEach((n, i) => {
                const el = document.getElementById(`sel-${n}`);
                el.value = (record && record[i+1]) ? record[i+1] : "On Time";
            });
        } catch(e) { document.getElementById('syncStat').innerHTML = "❌ Sync Error"; }
    }

    function changeMonth(step) {
        viewDate.setMonth(viewDate.getMonth() + step);
        renderHistory();
    }

    function renderHistory() {
        // Streak 计算逻辑：Late 会中断，但 Golden Ticket 不会
        const sorted = csvData.slice(1).sort((a, b) => new Date(a[0]) - new Date(b[0]));
        let streak = 0;
        sorted.forEach(row => { 
            const d = new Date(row[0]);
            if (d.getDay() !== 0 && d.getDay() !== 6) {
                const hasLate = row.slice(1).includes("Late");
                streak = hasLate ? 0 : streak + 1; 
            }
        });
        document.getElementById('streakDisplay').innerText = streak;

        document.getElementById('monthDisplay').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cal = document.getElementById('calendarGrid');
        cal.innerHTML = '';
        
        ["Mon", "Tue", "Wed", "Thu", "Fri"].forEach(d => cal.innerHTML += `<div class="weekday-label">${d}</div>`);

        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for(let d=1; d<=daysInMonth; d++) {
            const dateObj = new Date(year, month, d);
            const dayOfWeek = dateObj.getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) continue;
            if (d === 1 && dayOfWeek !== 1) {
                for(let i=0; i < dayOfWeek - 1; i++) cal.innerHTML += `<div class="cal-day empty"></div>`;
            }

            const curDate = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const row = csvData.find(r => r[0] === curDate);
            let cls = '', label = '';
            if(row) {
                const isLate = row.slice(1).includes("Late");
                const hasTicket = row.slice(1).includes("Golden Ticket");
                cls = isLate ? 'day-fail' : 'day-success';
                label = isLate ? '<span>LATE</span>' : (hasTicket ? '<span style="color:var(--gold)">TICKET</span>' : '<span>OK</span>');
            }
            cal.innerHTML += `<div class="cal-day ${cls}" id="cal-${curDate}" onclick="showDetail('${curDate}')"><strong>${d}</strong>${label}</div>`;
        }
    }

    function showDetail(dateStr) {
        selectedDateForDetail = dateStr;
        document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('day-active'));
        document.getElementById(`cal-${dateStr}`)?.classList.add('day-active');
        
        const row = csvData.find(r => r[0] === dateStr);
        const detailBox = document.getElementById('historyDetail');
        const content = document.getElementById('detailContent');
        document.getElementById('detailTitle').innerText = "Details for " + dateStr;
        
        if(!row) {
            content.innerHTML = "<p style='font-size:12px; color:#777'>No data recorded for this day.</p>";
        } else {
            content.innerHTML = team.map((name, i) => {
                const status = row[i+1] || "N/A";
                let color = "#5f6368";
                if(status === "Late") color = "var(--danger)";
                if(status === "On Time") color = "var(--success)";
                if(status === "Golden Ticket") color = "var(--gold)";
                return `<div class="detail-item"><span>${name}</span><span class="status-tag" style="color:${color}">${status}</span></div>`;
            }).join('');
        }
        detailBox.style.display = "block";
    }

    function editThisDay() {
        if(!selectedDateForDetail) return;
        document.getElementById('logDate').value = selectedDateForDetail;
        loadData();
        switchTab('checkin');
    }

    async function uploadToGitHub() {
        const btn = document.getElementById('saveBtn');
        const dateVal = document.getElementById('logDate').value;
        btn.disabled = true; btn.innerText = "⏳ Saving...";
        try {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
            const get = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const json = await get.json();
            const old = decodeURIComponent(escape(atob(json.content)));
            const newRow = [dateVal, ...team.map(n => document.getElementById(`sel-${n}`).value)].join(",");
            let lines = old.split('\n').filter(l => l.trim() !== "");
            const idx = lines.findIndex(l => l.startsWith(dateVal));
            if(idx !== -1) lines[idx] = newRow; else lines.push(newRow);

            await fetch(url, {
                method: "PUT",
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Update ${dateVal}`, content: btoa(unescape(encodeURIComponent(lines.join('\n')))), sha: json.sha })
            });
            alert("Updated Successfully!"); await loadData();
        } catch(e) { alert("Save Failed!"); }
        btn.disabled = false; btn.innerText = "Push Updates to GitHub";
    }

    document.getElementById('teamBody').innerHTML = team.map(n => `<tr><td><strong>${n}</strong></td><td><select id="sel-${n}">${options.map(o => `<option value="${o}">${o}</option>`).join('')}</select></td></tr>`).join('');
    loadData();
</script>
</body>
</html>
