<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Team Hub</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --bg: #f8f9fa; --danger: #d93025; --yellow: #fbc02d; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px; }
        .btn-token { background: none; border: 1px solid #dadce0; padding: 4px 10px; border-radius: 6px; cursor: pointer; color: #70757a; font-size: 11px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 25px; background: #f1f3f4; padding: 5px; border-radius: 10px; }
        .tab { flex: 1; padding: 12px; cursor: pointer; border: none; background: none; font-weight: bold; color: #5f6368; border-radius: 8px; transition: 0.2s; }
        .tab.active { background: white; color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

        .section { display: none; }
        .section.active { display: block; }

        /* --- 新日历样式 --- */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-nav button { background: #e8f0fe; border: none; color: var(--primary); padding: 5px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .calendar-nav h4 { margin: 0; font-size: 18px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .weekday-label { text-align: center; font-size: 11px; font-weight: bold; color: #70757a; padding-bottom: 5px; }
        .cal-day { aspect-ratio: 1.1; background: white; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #e0e0e0; font-size: 14px; position: relative; }
        .cal-day.empty { background: transparent; border: none; }
        .cal-day span { font-size: 8px; margin-top: 2px; font-weight: bold; }

        .day-success { background: #e6f4ea; color: #1e8e3e; border-color: #34a853; }
        .day-fail { background: #fce8e6; color: #d93025; border-color: #ea4335; }

        /* Redeem Card */
        .redeem-card { background: #fff9c4; border: 1px dashed var(--yellow); padding: 20px; border-radius: 12px; margin: 25px 0; }
        .redeem-item { display: flex; align-items: center; gap: 12px; margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.5); border-radius: 8px; }
        .redeem-item.locked { opacity: 0.4; filter: grayscale(1); }

        .date-picker-area { background: #e8f0fe; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: #70757a; font-size: 13px; border-bottom: 2px solid #f1f3f4; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f3f4; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #dadce0; }
        .btn-save { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-meta">
        <span id="syncStat">📡 Syncing...</span>
        <button class="btn-token" onclick="updateToken()">Update Token</button>
    </div>

    <div class="tabs">
        <button class="tab active" id="btn-checkin" onclick="switchTab('checkin')">Daily Log</button>
        <button class="tab" id="btn-history" onclick="switchTab('history')">History Archive</button>
    </div>

    <div id="checkin" class="section active">
        <div class="date-picker-area">
            <input type="date" id="logDate">
        </div>
        <table>
            <thead><tr><th>Member</th><th>Status</th></tr></thead>
            <tbody id="teamBody"></tbody>
        </table>
        <button class="btn-save" id="saveBtn" onclick="uploadToGitHub()">Push Updates to GitHub</button>
    </div>

    <div id="history" class="section">
        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">◀ Prev</button>
            <h4 id="monthDisplay">Month Year</h4>
            <button onclick="changeMonth(1)">Next ▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="redeem-card">
            <h3 style="margin-top:0">🎁 Milestone Rewards</h3>
            <p>Team Streak: <strong id="streakDisplay" style="color:var(--success)">0</strong> Days</p>
            <div id="redeemList"></div>
        </div>
    </div>
</div>

<script>
    const GITHUB_USER = "Jeeshau";
    const GITHUB_REPO = "Bolt-Clock-In";
    const FILE_PATH = "data.csv";
    const team = ["Annika", "Eleanor", "Geehye", "Gui", "Jenna", "Matt", "Oriol", "Tommy", "Zhixiao"];
    const options = ["On Time", "Late", "Remote", "OOO", "Sick", "PASS"];
    
    let GITHUB_TOKEN = localStorage.getItem('bolt_gh_token');
    let csvData = [];
    let viewDate = new Date(); // 用于日历显示的日期

    document.getElementById('logDate').valueAsDate = new Date();

    function switchTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'history') renderHistory();
    }

    function updateToken() {
        const t = prompt("Enter GitHub Token:");
        if(t) { localStorage.setItem('bolt_gh_token', t); location.reload(); }
    }

    async function loadData() {
        if(!GITHUB_TOKEN) return;
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            const resp = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const json = await resp.json();
            const content = decodeURIComponent(escape(atob(json.content)));
            csvData = content.split('\n').filter(l => l.trim() !== "").map(l => l.split(','));
            document.getElementById('syncStat').innerHTML = "✅ Synced";
            
            const dateVal = document.getElementById('logDate').value;
            const record = csvData.find(row => row[0] === dateVal);
            if(record) team.forEach((n, i) => { if(record[i+1]) document.getElementById(`sel-${n}`).value = record[i+1]; });
        } catch(e) { document.getElementById('syncStat').innerHTML = "❌ Sync Error"; }
    }

    function changeMonth(step) {
        viewDate.setMonth(viewDate.getMonth() + step);
        renderHistory();
    }

    function renderHistory() {
        // 1. 计算 Streak (基于全部历史)
        const sorted = csvData.slice(1).sort((a, b) => new Date(a[0]) - new Date(b[0]));
        let streak = 0;
        sorted.forEach(row => { streak = row.slice(1).includes("Late") ? 0 : streak + 1; });
        document.getElementById('streakDisplay').innerText = streak;

        // 2. 渲染日历
        document.getElementById('monthDisplay').innerText = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });
        const cal = document.getElementById('calendarGrid');
        cal.innerHTML = '';
        
        // 星期表头
        ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].forEach(d => {
            cal.innerHTML += `<div class="weekday-label">${d}</div>`;
        });

        const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();

        // 填充月初空白
        for(let i=0; i<firstDay; i++) cal.innerHTML += `<div class="cal-day empty"></div>`;

        // 填充日期
        for(let d=1; d<=daysInMonth; d++) {
            const curDate = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const row = csvData.find(r => r[0] === curDate);
            let cls = '', label = '';
            if(row) {
                const fail = row.slice(1).includes("Late");
                cls = fail ? 'day-fail' : 'day-success';
                label = fail ? '<span>LATE</span>' : '<span>OK</span>';
            }
            cal.innerHTML += `<div class="cal-day ${cls}"><strong>${d}</strong>${label}</div>`;
        }

        // 3. 奖励列表
        const milestones = [{d: 5, t: "Breakfast 🥐"}, {d: 10, t: "Lunch 🍱"}, {d: 15, t: "Remote 🏠"}, {d: 30, t: "Day Off ✈️"}];
        const redeemed = JSON.parse(localStorage.getItem('bolt_redeemed') || "{}");
        document.getElementById('redeemList').innerHTML = milestones.map(m => `
            <div class="redeem-item ${streak >= m.d ? '' : 'locked'}">
                <input type="checkbox" ${redeemed['s'+m.d] ? 'checked' : ''} ${streak >= m.d ? '' : 'disabled'} onchange="toggleRedeem('s${m.d}')">
                <span><strong>${m.d} Days:</strong> ${m.t}</span>
            </div>
        `).join('');
    }

    function toggleRedeem(k) {
        let r = JSON.parse(localStorage.getItem('bolt_redeemed') || "{}");
        r[k] = !r[k]; localStorage.setItem('bolt_redeemed', JSON.stringify(r));
    }

    async function uploadToGitHub() {
        const btn = document.getElementById('saveBtn');
        const dateVal = document.getElementById('logDate').value;
        btn.disabled = true; btn.innerText = "⏳ Saving...";
        try {
            const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
            const get = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const json = await get.json();
            const old = decodeURIComponent(escape(atob(json.content)));
            const newRow = [dateVal, ...team.map(n => document.getElementById(`sel-${n}`).value)].join(",");
            let lines = old.split('\n').filter(l => l.trim() !== "");
            const idx = lines.findIndex(l => l.startsWith(dateVal));
            if(idx !== -1) lines[idx] = newRow; else lines.push(newRow);

            await fetch(url, {
                method: "PUT",
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Log ${dateVal}`, content: btoa(unescape(encodeURIComponent(lines.join('\n')))), sha: json.sha })
            });
            alert("Success!"); await loadData();
        } catch(e) { alert("Error!"); }
        btn.disabled = false; btn.innerText = "Push Updates to GitHub";
    }

    document.getElementById('teamBody').innerHTML = team.map(n => `<tr><td><strong>${n}</strong></td><td><select id="sel-${n}">${options.map(o => `<option value="${o}">${o}</option>`).join('')}</select></td></tr>`).join('');
    loadData();
    document.getElementById('logDate').onchange = loadData;
</script>
</body>
</html>
