<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Team Clock-In</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #70757a; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #e8f0fe; }
        .section { display: none; }
        .section.active { display: block; }

        .rewards-banner { display: flex; justify-content: space-around; background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .reward-item { text-align: center; opacity: 0.25; font-size: 0.85em; transition: 0.3s; }
        .reward-item.active { opacity: 1; transform: scale(1.1); font-weight: bold; color: var(--success); }

        .date-selector { margin-bottom: 20px; padding: 15px; background: #fffde7; border-radius: 8px; border: 1px solid #fff59d; text-align: center; }
        input[type="date"] { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit; }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .tag-OnTime { background: #e6f4ea; color: #1e8e3e; }
        .tag-Late { background: #fce8e6; color: #d93025; }
        .tag-Remote { background: #fef7e0; color: #f9ab00; }

        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-reset { margin-top: 30px; background: none; border: none; color: #aaa; cursor: pointer; text-decoration: underline; font-size: 11px; display: block; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary);">⚡ Bolt Team Tracker</h2>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('checkin')">Daily Log</button>
        <button class="tab" onclick="switchTab('history')">History Archive</button>
    </div>

    <div id="checkin" class="section active">
        <div class="rewards-banner">
            <div class="reward-item" id="reward-5">🥐<br>5D: B-fast</div>
            <div class="reward-item" id="reward-10">🍱<br>10D: Lunch</div>
            <div class="reward-item" id="reward-15">🏠<br>15D: Remote</div>
            <div class="reward-item" id="reward-30">✈️<br>30D: Day Off</div>
        </div>

        <div class="date-selector">
            <label><strong>Logging for Date: </strong></label>
            <input type="date" id="logDate">
            <p style="font-size: 0.8em; color: #888; margin: 5px 0 0 0;">(You can backdate logs or update past records)</p>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <span style="font-size: 1.2em;">Team Streak: <strong><span id="teamStreak">0</span> Days</strong></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Member</th>
                    <th>Status</th>
                    <th>Streak</th>
                    <th>Tickets</th>
                </tr>
            </thead>
            <tbody id="teamBody"></tbody>
        </table>
        <button class="btn-save" onclick="saveData()">Confirm & Save to Archive</button>
    </div>

    <div id="history" class="section">
        <h3>Past Logs (Chronological)</h3>
        <div id="historyContainer"></div>
    </div>

    <button class="btn-reset" onclick="resetData()">Reset All Data</button>
</div>

<script>
    const team = ["Annika", "Eleanor", "Geehye", "Gui", "Jenna", "Matt", "Oriol", "Tommy", "Zhixiao"];
    const statusOptions = ["On Time", "Late", "Remote", "OOO", "Office Closed", "PASS", "Sick"];

    let state = JSON.parse(localStorage.getItem('bolt_v4_data')) || {
        history: [], // [{date: '2026-03-16', data: {...}}]
        members: team.reduce((acc, name) => {
            acc[name] = { tickets: 0 };
            return acc;
        }, {})
    };

    // 设置默认日期为今天
    document.getElementById('logDate').valueAsDate = new Date();

    function switchTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'history') renderHistory();
    }

    function initTable() {
        const body = document.getElementById('teamBody');
        body.innerHTML = '';
        const stats = calculateStreaks(); // 连胜次数现在根据历史记录动态计算
        
        team.forEach(name => {
            const m = state.members[name];
            body.innerHTML += `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td>
                        <select id="sel-${name}">
                            ${statusOptions.map(o => `<option value="${o}">${o}</option>`).join('')}
                        </select>
                    </td>
                    <td>${stats.personal[name] || 0}d</td>
                    <td>${m.tickets} 🎫</td>
                </tr>
            `;
        });
        document.getElementById('teamStreak').innerText = stats.team;
        updateRewards(stats.team);
    }

    // 核心逻辑：基于历史记录自动计算 Streaks
    function calculateStreaks() {
        // 先按日期从旧到新排序，才能正确计算连胜
        const sortedHistory = [...state.history].sort((a, b) => new Date(a.date) - new Date(b.date));
        
        let teamStreak = 0;
        let personalStreaks = {};
        team.forEach(n => personalStreaks[n] = 0);

        sortedHistory.forEach(day => {
            let dayPerfect = true;
            team.forEach(name => {
                const status = day.data[name];
                if(status === "On Time") {
                    personalStreaks[name]++;
                } else if (status === "Remote" || status === "Office Closed") {
                    // 保持连胜但不累加数值？或者累加？这里暂定不累加，保持数字
                } else {
                    personalStreaks[name] = 0;
                    dayPerfect = false;
                }
            });
            teamStreak = dayPerfect ? teamStreak + 1 : 0;
        });

        return { team: teamStreak, personal: personalStreaks };
    }

    function saveData() {
        const selectedDate = document.getElementById('logDate').value;
        if(!selectedDate) return alert("Please select a date.");

        const dailyRecord = { date: selectedDate, data: {} };
        team.forEach(name => {
            dailyRecord.data[name] = document.getElementById(`sel-${name}`).value;
        });

        // 检查是否已有该日期记录
        const existingIndex = state.history.findIndex(h => h.date === selectedDate);
        if(existingIndex !== -1) {
            if(!confirm("Record for this date already exists. Overwrite?")) return;
            state.history[existingIndex] = dailyRecord;
        } else {
            state.history.push(dailyRecord);
        }

        // 处理 Golden Ticket (每10天 On Time 自动获得)
        // 注意：这里的 Ticket 逻辑简单处理，如果你需要更复杂的可以手动加减
        const stats = calculateStreaks();
        team.forEach(name => {
            if(stats.personal[name] > 0 && stats.personal[name] % 10 === 0) {
                // 这里仅作演示提示，Ticket 逻辑可按需深度定制
            }
        });

        localStorage.setItem('bolt_v4_data', JSON.stringify(state));
        initTable();
        alert("Saved for " + selectedDate);
    }

    function renderHistory() {
        const container = document.getElementById('historyContainer');
        if(state.history.length === 0) {
            container.innerHTML = "<p>No logs found.</p>";
            return;
        }

        // 历史页面按日期倒序排列（最新的在最上面）
        const sorted = [...state.history].sort((a, b) => new Date(b.date) - new Date(a.date));

        container.innerHTML = sorted.map(entry => `
            <div style="border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; border-radius: 8px; background: #fff;">
                <div style="font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; display:flex; justify-content:space-between;">
                    <span>📅 ${entry.date}</span>
                    <button onclick="deleteRecord('${entry.date}')" style="color:red; background:none; border:none; cursor:pointer; font-size:10px;">Delete</button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                    ${Object.entries(entry.data).map(([n, s]) => `
                        <div style="font-size: 12px;">${n}: <span class="status-tag tag-${s.replace(' ', '')}">${s}</span></div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function deleteRecord(date) {
        if(!confirm("Delete record for " + date + "?")) return;
        state.history = state.history.filter(h => h.date !== date);
        localStorage.setItem('bolt_v4_data', JSON.stringify(state));
        renderHistory();
        initTable();
    }

    function updateRewards(streak) {
        [5, 10, 15, 30].forEach(d => {
            document.getElementById(`reward-${d}`).classList.toggle('active', streak >= d);
        });
    }

    function resetData() {
        if(confirm("Wipe everything?")) { localStorage.clear(); location.reload(); }
    }

    initTable();
</script>
</body>
</html>
