<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Live Sync Tracker</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #3c4043; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .sync-status { font-size: 12px; color: #666; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .date-box { background: #fffde7; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px dashed #fbc02d; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ddd; width: 100%; cursor: pointer; }
        .btn-save { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">🔄 Bolt Live Sync Tracker</h2>
    
    <div class="sync-status">
        <span id="syncIndicator">📡 Local Mode (Please provide Token)</span>
        <button onclick="updateToken()" style="font-size:10px; background:none; border:1px solid #ddd; cursor:pointer; padding:2px 5px; border-radius:4px;">Update Token</button>
    </div>

    <div class="date-box">
        <label><strong>Target Date: </strong></label>
        <input type="date" id="logDate">
    </div>

    <table>
        <thead><tr><th style="width: 40%;">Member</th><th>Status</th></tr></thead>
        <tbody id="teamBody"></tbody>
    </table>

    <button class="btn-save" id="saveBtn" onclick="uploadToGitHub()">Push Updates to GitHub (CSV)</button>
</div>

<script>
    const GITHUB_USER = "Jeeshau";
    const GITHUB_REPO = "Bolt-Clock-In";
    const FILE_PATH = "data.csv";
    const team = ["Annika", "Eleanor", "Geehye", "Gui", "Jenna", "Matt", "Oriol", "Tommy", "Zhixiao"];
    const options = ["On Time", "Late", "Remote", "OOO", "Sick", "PASS"];

    document.getElementById('logDate').valueAsDate = new Date();

    function updateToken() {
        const t = prompt("Please enter your NEW GitHub Token (ghp_...):");
        if (t) {
            localStorage.setItem('bolt_gh_token', t);
            location.reload();
        }
    }

    // 自动获取存储在浏览器本地的 Token
    const GITHUB_TOKEN = localStorage.getItem('bolt_gh_token');

    function initTable() {
        const body = document.getElementById('teamBody');
        body.innerHTML = team.map(n => `
            <tr><td><strong>${n}</strong></td><td><select id="sel-${n}">${options.map(o => `<option value="${o}">${o}</option>`).join('')}</select></td></tr>
        `).join('');
    }

    async function loadFromGitHub() {
        if (!GITHUB_TOKEN) {
            document.getElementById('syncIndicator').innerHTML = "<b style='color:orange'>🔑 Token Required. Click 'Update Token'</b>";
            return;
        }
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        try {
            const resp = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            if (!resp.ok) throw new Error("Auth failed");
            const json = await resp.json();
            const content = decodeURIComponent(escape(atob(json.content)));
            const lines = content.split('\n').filter(l => l.trim() !== "");
            const dateVal = document.getElementById('logDate').value;
            const record = lines.find(l => l.startsWith(dateVal));
            if (record) {
                const parts = record.split(',');
                team.forEach((name, i) => { document.getElementById(`sel-${name}`).value = parts[i+1]; });
                document.getElementById('syncIndicator').innerText = "✅ Data Synced";
            } else {
                document.getElementById('syncIndicator').innerText = "📅 No record for this date.";
            }
        } catch (e) { document.getElementById('syncIndicator').innerText = "❌ Connection Error"; }
    }

    async function uploadToGitHub() {
        if (!GITHUB_TOKEN) return updateToken();
        const btn = document.getElementById('saveBtn');
        const dateVal = document.getElementById('logDate').value;
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`;
        btn.disabled = true;
        btn.innerText = "⏳ Committing...";

        try {
            const getResp = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
            const getJson = await getResp.json();
            const oldContent = decodeURIComponent(escape(atob(getJson.content)));
            const newRow = [dateVal, ...team.map(n => document.getElementById(`sel-${n}`).value)].join(",");
            let lines = oldContent.split('\n').filter(l => l.trim() !== "");
            const idx = lines.findIndex(l => l.startsWith(dateVal));
            if (idx !== -1) lines[idx] = newRow; else lines.push(newRow);
            
            const putResp = await fetch(url, {
                method: "PUT",
                headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Log ${dateVal}`,
                    content: btoa(unescape(encodeURIComponent(lines.join('\n')))),
                    sha: getJson.sha
                })
            });
            if (putResp.ok) alert("🎉 CSV Updated!"); else throw new Error();
        } catch (e) { alert("Failed to save. Check Token permissions."); }
        btn.disabled = false; btn.innerText = "Push Updates to GitHub (CSV)";
        loadFromGitHub();
    }

    initTable();
    loadFromGitHub();
    document.getElementById('logDate').onchange = loadFromGitHub;
</script>
</body>
</html>
